    <header class="reader__head">
      <p class="reader__kicker"><b>04</b> Poem</p>
      <h1 class="reader__title">Five Lost Boys</h1>
    </header>

    <div class="reader__piece">
      <figure class="poem">
        <blockquote>
          <p>We walk barefoot<br />
          not an hour before sunset<br />
          to an abandoned staircase<br />
          laden with warnings of its danger.<br />
          We hop the gate and begin our descent,<br />
          down the rows of grey stones<br />
          and into the gorge below.</p>
          <p>The rustling of the trees<br />
          the beating of our bare feet<br />
          the rush of the stream<br />
          and the unaltered song of the mourning doves,<br />
          creates a forestal symphony<br />
          we have become addicted to hearing.</p>
          <p>The forbidden nature of this spot allures;<br />
          we feel rebellious,<br />
          we feel accepted,<br />
          we feel seen,<br />
          we feel rich.</p>
          <p>The sunset clouds turn peach pink<br />
          illuminating the land far past its rest.<br />
          In this light, the gorge gains a new character<br />
          as the mist from the waterfalls now becomes visible.</p>
          <p>The water rushes past our feet<br />
          with decisive forward motion<br />
          providing reassurance that life moves on<br />
          and that the past is non defining.</p>
          <p>The warm summer rain satiates the air<br />
          with the smell of freshly watered soil.<br />
          Unevaporated droplets still reside on the lower leaf;<br />
          they drip down onto our foreheads,<br />
          and run down our faces.</p>
          <p>As the peach sky of the sunset fades<br />
          the light blue of the early moon comes in its wake.<br />
          Its distant glow is inviting.<br />
          Its simple shape is soothing</p>
          <p>In its presence,<br />
          I beckon and I want<br />
          I release repressed emotions,<br />
          speak without restraint,<br />
          and discover more about who I am.</p>
          <p>We come to this place<br />
          to release energy;<br />
          We come to this place<br />
          to overcome ourselves.</p>
          <p>Under the influence of everyday tasks,<br />
          under the curtain of everyday sites,<br />
          we are reserved.<br />
          Not because we desire to be seen as tough,<br />
          but because we are scared of vulnerability.</p>
          <p>Like the first flower to rise in April,<br />
          Wondering if the sun will provide it life,</p>
          <p>Here, we forget about that.<br />
          For nature is in itself vulnerable<br />
          and in this vulnerability lies great strength<br />
          which then begins to flow through us.</p>
          <p>Nature always understands you<br />
          Better than yourself.<br />
          Open your ears and listen to its advice.<br />
          Calm your mind and think in its silence.<br />
          Unclench your fists and yell in its greatness.<br />
          Open your heart and love in its beauty.</p>
          <p>There&rsquo;s more to learn from things that don&rsquo;t speak<br />
          than from those that do.</p>
        </blockquote>
      </figure>
