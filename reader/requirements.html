<body class="reader">
  <svg class="svg-defs" width="0" height="0" aria-hidden="true" focusable="false">
    <filter id="ink" x="-4%" y="-4%" width="108%" height="108%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.92 0.98" numOctaves="2" seed="7" stitchTiles="stitch" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.1" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="ink-soft" x="-4%" y="-4%" width="108%" height="108%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="1.15 1.2" numOctaves="1" seed="4" stitchTiles="stitch" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.15" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="grain" aria-hidden="true"></div>

  <main class="reader__wrap">
    <a class="reader__back" href="../index.html#words" data-back aria-label="Back to Words">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7" /></svg>
      Words
    </a>

    <header class="reader__head">
      <p class="reader__kicker"><b>03</b> Poem · concrete</p>
      <h1 class="reader__title">Requirements</h1>
    </header>

    <div class="reader__piece">
      <figure class="poem poem--concrete">
<pre>Some people require
Attention
Impressions
Jests
Plans
Theatrics
Hierarchy
Narratives

                   Calm.
                     D
                     O
                     W
                     N
                Seriously.


               I hope this structure
     Pis   ses
           Y
            O
              U                OF-
                  F</pre>
      </figure>
    </div>

    <footer class="reader__foot">

        Back to Words
